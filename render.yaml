services:
  - type: web
    name: overload-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerBuildTarget: prod
    region: oregon
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: overload-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_TOKEN_TTL
        value: 15m
      - key: JWT_REFRESH_TOKEN_TTL
        value: 7d
      - key: CORS_ORIGIN
        sync: false
      - key: BCRYPT_ROUNDS
        value: 10

databases:
  - name: overload-db
    databaseName: overload
    user: overload
    plan: free
    region: oregon
